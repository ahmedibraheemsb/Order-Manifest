<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcomModa | عرض الأوردر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #fff;
            --surface-2: #f9fafb;
            --border: #e5e7eb;
            --border-strong: #d1d5db;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --accent-dark: #1d4ed8;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
            --green: #16a34a;
            --red: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background: var(--bg); 
            color: var(--text-primary);
            padding: 20px;
            line-height: 1.5;
        }

        .mono { font-family: 'IBM Plex Mono', monospace; direction: ltr; display: inline-block; }

        .container { max-width: 600px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 17px; font-weight: 700; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'IBM Plex Mono', monospace;
            direction: ltr;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border-strong);
            padding: 6px 12px;
            font-size: 12px;
        }
        .btn-secondary:hover:not(:disabled) { background: var(--surface-2); }

        .btn-primary-small {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
        }

        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px; }
        .order-name { font-size: 18px; font-weight: 800; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: var(--bg); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .info-item label { display: block; font-size: 10px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .info-item span { font-size: 14px; font-weight: 500; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
        th { text-align: right; padding: 8px; background: var(--surface-2); font-weight: 700; border-bottom: 2px solid var(--border-strong); }
        td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
        
        .metafield-label { font-weight: 600; color: var(--text-primary); display: block; }
        .metafield-key { font-size: 10px; color: var(--text-secondary); display: block; margin-top: 2px; }

        .settings-btn { background: none; color: var(--text-secondary); border: 1px solid var(--border); padding: 5px 10px; }
        #settingsPanel { display: none; margin-top: 10px; }
        
        .error { color: var(--red); font-size: 12px; margin-top: 8px; }

        /* Toast UI */
        #toast-container { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .toast { padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; color: white; box-shadow: var(--shadow); transition: opacity 0.3s ease; }
        .toast.success { background: var(--green); }
        .toast.error { background: var(--red); }
        .toast.neutral { background: var(--text-primary); }

        /* Confirm Modal UI */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-card { background: var(--surface); border-radius: var(--radius); width: 90%; max-width: 400px; padding: 24px; box-shadow: var(--shadow); }
        .modal-header { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
        .modal-body { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
        .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-cancel { background: var(--surface-2); border: 1px solid var(--border-strong); color: var(--text-primary); padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-confirm-ok { padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600; color: white; border: none; }
        .btn-confirm-ok.primary { background: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>EcomModa | مستعرض الطلبات</h1>
        <button class="settings-btn" onclick="toggleSettings()">⚙️ الإعدادات</button>
    </header>

    <div id="settingsPanel" class="card">
        <div class="info-item" style="margin-bottom: 10px;">
            <label>Worker URL</label>
            <input type="text" id="workerUrl" placeholder="https://your-worker.workers.dev">
        </div>
        <div class="info-item" style="margin-bottom: 10px;">
            <label>Worker Secret</label>
            <input type="password" id="workerSecret" placeholder="••••••••">
        </div>
        <div class="info-item">
            <label>Flow Token (Flow Companion)</label>
            <input type="password" id="flowToken" placeholder="••••••••">
        </div>
        <button onclick="saveSettings()" style="margin-top: 12px; width: 100%;">حفظ الإعدادات</button>
    </div>

    <div class="search-box">
        <input type="text" id="orderInput" placeholder="#38194" onkeypress="if(event.key==='Enter') fetchOrder()">
        <button onclick="fetchOrder()">بحث</button>
    </div>

    <div id="resultArea"></div>
</div>

<div id="toast-container"></div>

<div id="confirmOverlay" class="modal-overlay">
    <div class="modal-card">
        <div id="confirmHeader" class="modal-header"></div>
        <div id="confirmBody" class="modal-body"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="document.getElementById('confirmOverlay').classList.remove('open')">إلغاء</button>
            <button id="confirmOkBtn" class="btn-confirm-ok">تأكيد</button>
        </div>
    </div>
</div>

<script>
    const LS_URL_KEY = 'orderviewer_worker_url';
    const LS_SEC_KEY = 'orderviewer_worker_secret';
    const LS_FLOW_KEY = 'orderviewer_flow_token';

    const KNOWN_METAFIELDS = [
        { key: 'manual_status', label: 'STATUS' },
        { key: 'payment', label: 'PAYMENT' },
        { key: 'partial_delivery', label: 'Partial Delivery' },
        { key: 'zone', label: 'Zone' },
        { key: 'courier', label: 'Courier' },
        { key: 'pickup_date', label: 'Pickup Date' },
        { key: 'bosta_webhook', label: 'Bosta Webhook' },
        { key: 'bosta_order_type', label: 'Bosta Order Type' },
        { key: 'bosta_tracking_number', label: 'Bosta Tracking Number' },
        { key: 'status_2_r_e_', label: 'Status(2) [R&E]' },
        { key: 'packed_by', label: 'Packed By' },
        { key: 'packing_date_time', label: 'Packing Date & Time' },
        { key: 'extra_shipping_fees', label: 'Extra Shipping Fees' }
    ];

    document.getElementById('workerUrl').value = localStorage.getItem(LS_URL_KEY) || '';
    document.getElementById('workerSecret').value = localStorage.getItem(LS_SEC_KEY) || '';
    document.getElementById('flowToken').value = localStorage.getItem(LS_FLOW_KEY) || '';

    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        localStorage.setItem(LS_URL_KEY, document.getElementById('workerUrl').value);
        localStorage.setItem(LS_SEC_KEY, document.getElementById('workerSecret').value);
        localStorage.setItem(LS_FLOW_KEY, document.getElementById('flowToken').value);
        toggleSettings();
        showToast('تم حفظ الإعدادات', 'success');
    }

    function showToast(msg, type = 'neutral') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // Modal Pattern من الـ Dev-Guide
    function openConfirm(headerHTML, bodyHTML, okLabel, okClass, onConfirm) {
        document.getElementById('confirmHeader').innerHTML = headerHTML;
        document.getElementById('confirmBody').innerHTML = bodyHTML;

        const okBtn = document.getElementById('confirmOkBtn');
        const newOk = okBtn.cloneNode(true);
        okBtn.parentNode.replaceChild(newOk, okBtn);

        newOk.textContent = okLabel;
        newOk.className = 'btn-confirm-ok ' + okClass;
        newOk.addEventListener('click', () => {
            document.getElementById('confirmOverlay').classList.remove('open');
            onConfirm();
        });
        
        document.getElementById('confirmOverlay').classList.add('open');
    }

    function formatDateTime(isoString) {
        const d = new Date(isoString);
        const pad = n => String(n).padStart(2, '0');
        let hours = d.getHours();
        const minutes = pad(d.getMinutes());
        const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
        hours = hours % 12 || 12;
        return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()} الساعة ${pad(hours)}:${minutes} ${ampm}`;
    }

    async function fetchOrder() {
        const orderInput = document.getElementById('orderInput');
        const resultArea = document.getElementById('resultArea');
        const orderNumber = orderInput.value.trim();
        
        const url = localStorage.getItem(LS_URL_KEY);
        const secret = localStorage.getItem(LS_SEC_KEY);

        if (!url || !secret) {
            showToast('يرجى ضبط إعدادات الـ Worker أولاً', 'error');
            toggleSettings(); return;
        }

        if (!orderNumber) return;

        resultArea.innerHTML = '<p style="text-align:center; font-size:13px; color:var(--text-secondary);">جاري البحث...</p>';

        try {
            const res = await fetch(`${url}?orderNumber=${encodeURIComponent(orderNumber)}`, {
                headers: { 'X-Worker-Secret': secret }
            });
            const response = await res.json();

            if (!res.ok || !response.ok) throw new Error(response.error || 'خطأ في الاتصال');

            renderOrder(response.data);
        } catch (err) {
            resultArea.innerHTML = `<div class="card error">${err.message}</div>`;
        }
    }

    // الدالة الجديدة لتغيير الحالة لـ Print
    function triggerUpdateStatusToPrint(orderId, orderName, currentStatus) {
        const bodyHTML = `
            هل أنت متأكد من تغيير حالة الطلب <span class="mono" style="font-weight:700">${orderName}</span>؟
            <br><br>
            الحالة الحالية: <strong>${currentStatus || 'فارغ'}</strong><br>
            الحالة الجديدة: <strong style="color:var(--accent)">Print</strong>
        `;

        openConfirm('تأكيد تغيير الحالة', bodyHTML, 'نعم، تغيير', 'primary', async () => {
            const url = localStorage.getItem(LS_URL_KEY);
            const secret = localStorage.getItem(LS_SEC_KEY);

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Worker-Secret': secret 
                    },
                    body: JSON.stringify({
                        action: 'SET_STATUS_PRINT',
                        orderId: orderId
                    })
                });

                const data = await res.json();
                if (data.ok) {
                    showToast('تم تحديث حالة الأوردر بنجاح لـ Print', 'success');
                    // Optimistic Update للجدول
                    const statusCell = document.getElementById('mf-status-value');
                    if (statusCell) {
                        statusCell.innerHTML = 'Print';
                        statusCell.style.color = 'var(--accent)';
                        statusCell.style.fontWeight = '700';
                    }
                } else {
                    throw new Error(data.error || 'حدث خطأ أثناء التحديث');
                }
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    }

    async function addTestTag(orderId, btnElement) {
        const flowToken = localStorage.getItem(LS_FLOW_KEY);
        if (!flowToken) {
            showToast('يرجى إضافة Flow Token في الإعدادات', 'error');
            toggleSettings(); return;
        }

        const originalText = btnElement.textContent;
        btnElement.textContent = 'جاري الإضافة...';
        btnElement.disabled = true;

        try {
            const res = await fetch('https://flow-companion.mivicle.app/rest/1/flow/start/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bearerToken: flowToken, itemId: orderId, specifier: 'ADD_TEST_VIEW_TAG' })
            });

            if (res.status === 200) {
                showToast('تم تشغيل مسار الإضافة بنجاح', 'success');
                const tagsContainer = document.getElementById('tagsContainer');
                if (tagsContainer && !tagsContainer.innerHTML.includes('Test-View')) {
                    const newTag = document.createElement('span');
                    newTag.style.cssText = 'font-size:11px; background:var(--accent-light); color:var(--accent-dark); border:1px solid var(--accent); padding:2px 6px; border-radius:4px; font-weight:600;';
                    newTag.textContent = 'Test-View';
                    tagsContainer.appendChild(newTag);
                }
            } else {
                const errData = await res.json().catch(() => ({}));
                showToast(errData.message || 'حدث خطأ غير متوقع', 'error');
            }
        } catch (e) {
            showToast('خطأ في الاتصال بالسيرفر', 'error');
        } finally {
            btnElement.textContent = originalText;
            btnElement.disabled = false;
        }
    }

    function renderOrder(order) {
        const formattedDate = formatDateTime(order.createdAt);

        const itemsHtml = order.lineItems.nodes.map(item => `
            <tr>
                <td>${item.title}</td>
                <td class="mono">${item.sku || '-'}</td>
                <td style="text-align:center">${item.quantity.toLocaleString('en-US')}</td>
            </tr>
        `).join('');

        const tagsHtml = order.tags.map(t => `<span style="font-size:11px; background:var(--surface-2); border:1px solid var(--border); padding:2px 6px; border-radius:4px;">${t}</span>`).join('');

        const apiFields = {};
        if (order.metafields && order.metafields.nodes) {
            order.metafields.nodes.forEach(mf => { apiFields[mf.key] = mf; });
        }

        let metafieldsHtml = '';
        
        KNOWN_METAFIELDS.forEach(kf => {
            const fieldData = apiFields[kf.key];
            const valueHTML = fieldData && fieldData.value ? fieldData.value : '<span style="color:var(--text-muted)">-</span>';
            const cellId = kf.key === 'manual_status' ? 'id="mf-status-value"' : '';

            metafieldsHtml += `
                <tr>
                    <td style="width: 40%;">
                        <span class="metafield-label">${kf.label}</span>
                        <span class="metafield-key">${kf.key}</span>
                    </td>
                    <td class="mono" style="word-break: break-all;" ${cellId}>
                        ${valueHTML}
                    </td>
                </tr>
            `;
            if (fieldData) delete apiFields[kf.key];
        });

        Object.values(apiFields).forEach(mf => {
            metafieldsHtml += `
                <tr>
                    <td style="width: 40%;">
                        <span class="metafield-label">${mf.key}</span>
                        <span class="metafield-key">${mf.namespace}.${mf.key}</span>
                    </td>
                    <td class="mono" style="word-break: break-all;">${mf.value}</td>
                </tr>
            `;
        });

        // استخراج الحالة الحالية لتبمريرها للمودال
        const currentStatus = apiFields['manual_status']?.value || '';

        document.getElementById('resultArea').innerHTML = `
            <div class="card">
                <div class="order-header">
                    <span class="order-name mono">${order.name}</span>
                    <span class="status-pill">${order.displayFulfillmentStatus}</span>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <label>العميل</label>
                        <span>${order.customer ? order.customer.firstName + ' ' + order.customer.lastName : 'عميل غير مسجل'}</span>
                    </div>
                    <div class="info-item">
                        <label>الموبايل</label>
                        <span class="mono">${order.customer?.phone || '-'}</span>
                    </div>
                    <div class="info-item">
                        <label>التاريخ</label>
                        <span style="font-size:12px; direction:ltr; display:inline-block;" class="mono">${formattedDate}</span>
                    </div>
                    <div class="info-item">
                        <label>المبلغ المطلوب (COD)</label>
                        <span class="mono" style="font-weight:700; color:var(--accent)">
                            ${parseFloat(order.totalOutstandingSet.shopMoney.amount).toLocaleString('en-US')} EGP
                        </span>
                    </div>
                </div>

                <label style="font-size:10px; font-weight:700; color:var(--text-secondary); margin-bottom:8px; display:block;">المنتجات</label>
                <table>
                    <thead>
                        <tr>
                            <th>المنتج</th>
                            <th>SKU</th>
                            <th style="text-align:center">الكمية</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                </table>

                <label style="font-size:10px; font-weight:700; color:var(--text-secondary); margin-bottom:8px; margin-top:20px; display:block;">البيانات الإضافية (Metafields)</label>
                <table>
                    <thead>
                        <tr>
                            <th>الحقل (Label)</th>
                            <th>القيمة (Value)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${metafieldsHtml}
                    </tbody>
                </table>

                <div style="margin-top:24px; display:flex; justify-content:space-between; align-items:flex-end;">
                    <div>
                        <label style="font-size:10px; font-weight:700; color:var(--text-secondary); margin-bottom:6px; display:block;">التاجز</label>
                        <div id="tagsContainer" style="display:flex; gap:6px; flex-wrap:wrap;">
                            ${tagsHtml}
                        </div>
                    </div>
                    
                    <div style="display:flex; gap:8px; flex-direction:column; align-items:flex-end;">
                        <button class="btn-primary-small" onclick="triggerUpdateStatusToPrint('${order.id}', '${order.name}', '${currentStatus}')">تغيير الحالة لـ Print</button>
                        <button class="btn-secondary" onclick="addTestTag('${order.id}', this)">+ إضافة Test-View</button>
                    </div>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
