<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcomModa - الأوردرات الجاهزة للتغليف</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- ExcelJS Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #fff;
      --surface-2: #f9fafb;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --accent-dark: #1d4ed8;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --green-border: #86efac;
      --red: #dc2626;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --font-arabic: 'Noto Sans Arabic', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-arabic);
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      padding: 20px;
    }

    /* Header & Buttons */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
    }

    .btn {
      background-color: var(--surface);
      border: 1px solid var(--border-strong);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-arabic);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover:not(:disabled) { background-color: var(--surface-2); }
    .btn-primary { background-color: var(--accent); color: white; border-color: var(--accent); }
    .btn-primary:hover:not(:disabled) { background-color: var(--accent-dark); }
    .btn-primary.active { background-color: var(--green); border-color: var(--green); }
    .btn-primary.active:hover { background-color: #15803d; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .card {
      background-color: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* Toolbar (Search & Export) */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background-color: var(--surface);
    }
    
    .search-input {
      padding: 8px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-family: var(--font-arabic);
      font-size: 13px;
      width: 280px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Table Styles */
    .table-container {
      width: 100%;
      overflow-x: auto;
      max-height: 75vh;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: right;
    }

    th, td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    /* Sticky Headers */
    thead tr:nth-child(1) th {
      background-color: #e5e7eb;
      font-weight: 700;
      color: var(--text-primary);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
    }
    
    thead tr:nth-child(2) th {
      background-color: var(--surface-2);
      position: sticky;
      top: 45px;
      z-index: 9;
      padding: 6px 8px;
      border-bottom: 2px solid var(--border-strong);
    }

    /* Column Filters */
    .col-filter {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-arabic);
      outline: none;
      background: var(--surface);
    }
    .col-filter:focus { border-color: var(--accent); }
    .col-filter::placeholder { color: var(--text-muted); }

    /* Zebra Striping & Hover */
    tbody tr:nth-child(even) { background-color: var(--surface-2); }
    tbody tr:hover { background-color: #f3f4f6; }
    tbody tr.selected { background-color: var(--accent-light); }

    /* Checkbox */
    .checkbox-cell {
      width: 40px;
      text-align: center;
      padding: 12px 8px;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* Typography & Utilities */
    .mono { font-family: var(--font-mono); direction: ltr; display: inline-block; }
    
    .sub-text {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .copyable {
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .copyable:hover { color: var(--accent); }
    .copyable::after {
      content: '📋';
      font-size: 10px;
      position: absolute;
      margin-right: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .copyable:hover::after { opacity: 1; }

    .tag-pill {
      background-color: #e5e7eb;
      border: 1px solid var(--border-strong);
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      color: var(--text-secondary);
      margin-inline-end: 4px;
      margin-bottom: 4px;
      display: inline-block;
    }
    .tag-packed { background-color: var(--green-light); border-color: var(--green-border); color: var(--green); font-weight: 600; }
    
    .status-badge {
      background-color: var(--accent-light);
      color: var(--accent-dark);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      display: inline-block;
    }

    .count-pill {
      background: var(--border-strong);
      color: var(--text-primary);
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 6px;
      display: inline-block;
    }

    .col-wide { width: 20%; min-width: 160px; }
    
    .notes-container {
      max-height: 80px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) transparent;
      color: var(--text-secondary);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      padding-left: 8px;
    }

    /* Skeleton Loader */
    .skeleton-row td { padding: 16px; }
    .skeleton-box {
      height: 16px;
      border-radius: 4px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* State Box */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      text-align: center;
    }
    .state-box .icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
    .state-box p { font-size: 14px; color: var(--text-muted); font-weight: 500; }
    .state-box .progress { font-size: 12px; color: var(--accent); margin-top: 8px; font-weight: 600; }

    /* Modals & Toasts */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface); border-radius: var(--radius); width: 400px; max-width: 90vw;
      padding: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .input-group input {
      width: 100%; padding: 10px; border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 13px;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

    #toast {
      position: fixed; bottom: 24px; right: 24px; padding: 12px 24px; border-radius: var(--radius-sm);
      color: white; font-size: 14px; font-weight: 600; transform: translateY(100px); transition: transform 0.3s; z-index: 200;
      box-shadow: var(--shadow);
    }
    #toast.show { transform: translateY(0); }
    #toast.success { background-color: var(--green); }
    #toast.error { background-color: var(--red); }
    #toast.info { background-color: var(--text-primary); }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1>أوردرات Ready (<span id="totalCount">0</span>)</h1>
    <div>
      <button class="btn" id="refreshBtn" onclick="startFetching()">🔄 تحديث البيانات</button>
      <button class="btn" onclick="openSettings()">⚙️ الإعدادات</button>
    </div>
  </div>

  <div class="card">
    
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" style="display: none;">
      <input type="text" id="globalSearchInput" class="search-input" placeholder="بحث سريع في كل البيانات..." oninput="applyFilters()">
      <button class="btn btn-primary" id="exportBtn" onclick="exportToExcel()">📊 تصدير XLSX</button>
    </div>

    <!-- Empty/Error State -->
    <div id="emptyState" class="state-box">
      <div class="icon" id="stateIcon">⌛</div>
      <p id="stateText">جاري تهيئة الأداة...</p>
      <div class="progress" id="stateProgress"></div>
    </div>
    
    <div class="table-container" id="tableContainer" style="display: none;">
      <table>
        <thead>
          <!-- Main Header -->
          <tr>
            <th class="checkbox-cell">
              <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this.checked)" title="تحديد الكل">
            </th>
            <th>رقم الأوردر</th>
            <th>تاريخ الإنشاء</th>
            <th>العميل</th>
            <th>البيانات المالية</th>
            <th>الشحن</th>
            <th>تاريخ التغليف</th>
            <th class="col-wide">Tags</th>
            <th class="col-wide">Notes</th>
          </tr>
          <!-- Filters Header -->
          <tr>
            <th class="checkbox-cell"></th>
            <th><input type="text" class="col-filter mono" placeholder="فلتر..." id="filter_order" oninput="applyFilters()"></th>
            <th><input type="text" class="col-filter mono" placeholder="فلتر..." id="filter_date" oninput="applyFilters()"></th>
            <th><input type="text" class="col-filter" placeholder="اسم / تليفون..." id="filter_customer" oninput="applyFilters()"></th>
            <th><input type="text" class="col-filter" placeholder="سعر / قطع..." id="filter_finance" oninput="applyFilters()"></th>
            <th><input type="text" class="col-filter" placeholder="Courier / Zone..." id="filter_shipping" oninput="applyFilters()"></th>
            <th><input type="text" class="col-filter mono" placeholder="فلتر..." id="filter_packdate" oninput="applyFilters()"></th>
            <th><input type="text" class="col-filter" placeholder="فلتر..." id="filter_tags" oninput="applyFilters()"></th>
            <th><input type="text" class="col-filter" placeholder="فلتر..." id="filter_notes" oninput="applyFilters()"></th>
          </tr>
        </thead>
        <tbody id="skeletonBody" style="display: none;">
          <!-- Skeleton rows injected via JS -->
        </tbody>
        <tbody id="tableBody">
          <!-- Real Rows -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsOverlay">
    <div class="modal">
      <h2 class="modal-title">إعدادات الـ API</h2>
      <div class="input-group">
        <label>Worker URL</label>
        <input type="text" id="workerUrlInput" placeholder="https://..." dir="ltr">
      </div>
      <div class="input-group">
        <label>Worker Secret</label>
        <input type="password" id="workerSecretInput" dir="ltr">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeSettings()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveSettings()">حفظ</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const LS_URL_KEY = 'ready_orders_worker_url';
    const LS_SEC_KEY = 'ready_orders_worker_secret';
    
    // State Management
    let isFetching = false;
    let allOrders = []; 
    let filteredOrders = [];
    let selectedOrderIds = new Set();

    // --- Core Utilities ---
    function getConfig() {
      return { url: localStorage.getItem(LS_URL_KEY) || '', secret: localStorage.getItem(LS_SEC_KEY) || '' };
    }

    function isConfigured() {
      const config = getConfig();
      return config.url && config.secret;
    }

    let toastTimeout;
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      clearTimeout(toastTimeout);
      toast.textContent = message;
      toast.className = `show ${type}`;
      toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    function copyToClipboard(text, label) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.top = "0";
      textArea.style.left = "0";
      textArea.style.position = "fixed";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
        showToast(`تم نسخ ${label}: ${text}`, 'info');
      } catch (err) {
        showToast('فشل النسخ', 'error');
      }
      document.body.removeChild(textArea);
    }

    // --- Formatters ---
    function formatDate(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`;
    }

    function formatPackingDateOnly(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      const pad = n => String(n).padStart(2, '0');
      const hours = d.getHours();
      const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
      return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()} ${ampm}`;
    }

    function formatNumber(num) { return Number(num).toLocaleString('en-US'); }

    // --- Modal Actions ---
    function openSettings() {
      const config = getConfig();
      document.getElementById('workerUrlInput').value = config.url;
      document.getElementById('workerSecretInput').value = config.secret;
      document.getElementById('settingsOverlay').classList.add('open');
    }

    function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }

    function saveSettings() {
      localStorage.setItem(LS_URL_KEY, document.getElementById('workerUrlInput').value.trim());
      localStorage.setItem(LS_SEC_KEY, document.getElementById('workerSecretInput').value.trim());
      closeSettings();
      showToast('تم حفظ الإعدادات');
      startFetching();
    }

    // --- Skeleton Loader Logic ---
    function renderSkeleton() {
      const tbody = document.getElementById('skeletonBody');
      let html = '';
      for(let i=0; i<8; i++) {
        html += `<tr class="skeleton-row">
          <td><div class="skeleton-box" style="width: 16px; height: 16px; margin: auto;"></div></td>
          <td><div class="skeleton-box" style="width: 80px;"></div></td>
          <td><div class="skeleton-box" style="width: 90px;"></div></td>
          <td><div class="skeleton-box" style="width: 120px;"></div><div class="skeleton-box" style="width: 90px; margin-top: 6px; height: 12px;"></div></td>
          <td><div class="skeleton-box" style="width: 100px;"></div></td>
          <td><div class="skeleton-box" style="width: 80px;"></div><div class="skeleton-box" style="width: 60px; margin-top: 6px; height: 12px;"></div></td>
          <td><div class="skeleton-box" style="width: 90px;"></div></td>
          <td><div class="skeleton-box" style="width: 100%;"></div></td>
          <td><div class="skeleton-box" style="width: 100%; height: 40px;"></div></td>
        </tr>`;
      }
      tbody.innerHTML = html;
      tbody.style.display = 'table-row-group';
      document.getElementById('tableBody').style.display = 'none';
    }

    function hideSkeleton() {
      document.getElementById('skeletonBody').style.display = 'none';
      document.getElementById('tableBody').style.display = 'table-row-group';
    }

    // --- Main Fetching Logic ---
    async function startFetching() {
      if (!isConfigured()) { openSettings(); return; }
      if (isFetching) return;

      isFetching = true;
      document.getElementById('refreshBtn').disabled = true;
      
      const emptyState = document.getElementById('emptyState');
      const tableContainer = document.getElementById('tableContainer');
      const toolbar = document.getElementById('toolbar');
      
      // Reset State
      allOrders = [];
      filteredOrders = [];
      selectedOrderIds.clear();
      updateExportButtonUI();
      
      // Clear inputs
      document.getElementById('globalSearchInput').value = '';
      document.querySelectorAll('.col-filter').forEach(i => i.value = '');
      document.getElementById('selectAllCheckbox').checked = false;
      document.getElementById('tableBody').innerHTML = '';
      document.getElementById('totalCount').textContent = '0';
      
      // UI to loading state
      emptyState.style.display = 'none';
      toolbar.style.display = 'flex';
      tableContainer.style.display = 'block';
      renderSkeleton();

      const config = getConfig();
      let hasNextPage = true;
      let cursor = null;

      try {
        while (hasNextPage) {
          const fetchUrl = new URL(config.url);
          if (cursor) fetchUrl.searchParams.set('cursor', cursor);

          const res = await fetch(fetchUrl.toString(), {
            method: 'GET',
            headers: { 'X-Worker-Secret': config.secret }
          });

          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error(data.error || 'خطأ في الاتصال');

          if (data.data && data.data.length > 0) {
            const processedData = data.data.map(o => ({
              ...o,
              _formattedDate: formatDate(o.createdAt),
              _formattedPackDate: formatPackingDateOnly(o.packingDate)
            }));
            
            allOrders = allOrders.concat(processedData);
            applyFilters();
            hideSkeleton();
            document.getElementById('totalCount').textContent = allOrders.length;
          }

          hasNextPage = data.pageInfo.hasNextPage;
          cursor = data.pageInfo.endCursor;
        }

        // Fetching Complete
        isFetching = false;
        document.getElementById('refreshBtn').disabled = false;
        hideSkeleton();
        
        if (allOrders.length === 0) {
          emptyState.style.display = 'flex';
          tableContainer.style.display = 'none';
          toolbar.style.display = 'none';
          document.getElementById('stateIcon').textContent = '📦';
          document.getElementById('stateText').textContent = 'لا توجد أوردرات جاهزة (Ready) من 2026';
        } else {
          showToast(`تم تحميل ${allOrders.length.toLocaleString('en-US')} أوردر بنجاح`);
        }

      } catch (error) {
        isFetching = false;
        document.getElementById('refreshBtn').disabled = false;
        hideSkeleton();
        
        if (allOrders.length === 0) {
          emptyState.style.display = 'flex';
          tableContainer.style.display = 'none';
          toolbar.style.display = 'none';
          document.getElementById('stateIcon').textContent = '❌';
          document.getElementById('stateText').textContent = error.message;
          document.getElementById('stateText').style.color = 'var(--red)';
        }
        showToast(error.message, 'error');
      }
    }

    // --- Selection Logic ---
    function toggleRowSelection(orderId, isChecked) {
      if (isChecked) {
        selectedOrderIds.add(orderId);
      } else {
        selectedOrderIds.delete(orderId);
      }
      
      const row = document.getElementById(`row-${orderId}`);
      if (row) {
        isChecked ? row.classList.add('selected') : row.classList.remove('selected');
      }

      const allVisibleSelected = filteredOrders.length > 0 && filteredOrders.every(o => selectedOrderIds.has(o.id));
      document.getElementById('selectAllCheckbox').checked = allVisibleSelected;
      
      updateExportButtonUI();
    }

    function toggleSelectAll(isChecked) {
      filteredOrders.forEach(o => {
        if (isChecked) {
          selectedOrderIds.add(o.id);
        } else {
          selectedOrderIds.delete(o.id);
        }
        
        const row = document.getElementById(`row-${o.id}`);
        if (row) {
          isChecked ? row.classList.add('selected') : row.classList.remove('selected');
        }
      });
      
      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.checked = isChecked;
      });

      updateExportButtonUI();
    }

    function updateExportButtonUI() {
      const btn = document.getElementById('exportBtn');
      if (selectedOrderIds.size > 0) {
        btn.innerHTML = `📊 تصدير المحدد (${selectedOrderIds.size.toLocaleString('en-US')})`;
        btn.classList.add('active');
      } else {
        btn.innerHTML = `📊 تصدير XLSX`;
        btn.classList.remove('active');
      }
    }

    // --- Filtering Logic ---
    function applyFilters() {
      const globalTerm = document.getElementById('globalSearchInput').value.trim().toLowerCase();
      
      const f_order    = document.getElementById('filter_order').value.trim().toLowerCase();
      const f_date     = document.getElementById('filter_date').value.trim().toLowerCase();
      const f_customer = document.getElementById('filter_customer').value.trim().toLowerCase();
      const f_finance  = document.getElementById('filter_finance').value.trim().toLowerCase();
      const f_shipping = document.getElementById('filter_shipping').value.trim().toLowerCase();
      const f_packdate = document.getElementById('filter_packdate').value.trim().toLowerCase();
      const f_tags     = document.getElementById('filter_tags').value.trim().toLowerCase();
      const f_notes    = document.getElementById('filter_notes').value.trim().toLowerCase();

      filteredOrders = allOrders.filter(order => {
        if (globalTerm) {
          const globalMatch = 
            (order.name || '').toLowerCase().includes(globalTerm) ||
            (order.customerName || '').toLowerCase().includes(globalTerm) ||
            (order.phone || '').toLowerCase().includes(globalTerm);
          if (!globalMatch) return false;
        }

        if (f_order    && !(order.name || '').toLowerCase().includes(f_order)) return false;
        if (f_date     && !order._formattedDate.includes(f_date)) return false;
        if (f_customer && !((order.customerName || '').toLowerCase().includes(f_customer) || (order.phone || '').toLowerCase().includes(f_customer))) return false;
        if (f_finance  && !(String(order.totalPrice).includes(f_finance) || String(order.totalItems).includes(f_finance))) return false;
        if (f_shipping && !((order.courier || '').toLowerCase().includes(f_shipping) || (order.zone || '').toLowerCase().includes(f_shipping))) return false;
        if (f_packdate && !order._formattedPackDate.includes(f_packdate)) return false;
        
        if (f_tags) {
          const tagsStr = (order.tags || []).join(' ').toLowerCase();
          if (!tagsStr.includes(f_tags)) return false;
        }
        
        if (f_notes && !(order.note || '').toLowerCase().includes(f_notes)) return false;

        return true;
      });

      renderTable(filteredOrders);
      
      const allVisibleSelected = filteredOrders.length > 0 && filteredOrders.every(o => selectedOrderIds.has(o.id));
      document.getElementById('selectAllCheckbox').checked = allVisibleSelected;
    }

    // --- Rendering ---
    function renderTable(orders) {
      const tbody = document.getElementById('tableBody');
      
      if (orders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:40px; color:var(--text-muted);">لا توجد نتائج مطابقة للبحث</td></tr>`;
        return;
      }
      
      let html = '';
      orders.forEach(order => {
        const isSelected = selectedOrderIds.has(order.id);
        const rowClass = isSelected ? 'selected' : '';

        // Escape ID for use in HTML attributes (GID contains slashes and colons)
        const safeId = encodeURIComponent(order.id);

        const tagsHtml = order.tags.map(t => {
          const isPacked = t.toLowerCase() === 'packed';
          return `<span class="tag-pill ${isPacked ? 'tag-packed' : ''}">${t}</span>`;
        }).join('');

        const cleanPhone = order.phone.replace(/[^0-9+]/g, '');

        html += `
          <tr id="row-${safeId}" class="${rowClass}">
            <td class="checkbox-cell">
              <input type="checkbox" class="row-checkbox" data-id="${order.id}" ${isSelected ? 'checked' : ''} onchange="toggleRowSelection(decodeURIComponent(this.dataset.id), this.checked)">
            </td>
            <td>
              <span class="mono copyable" onclick="copyToClipboard('${order.name}', 'رقم الأوردر')" title="نسخ رقم الأوردر">${order.name}</span>
            </td>
            <td><span class="mono">${order._formattedDate}</span></td>
            <td>
              <div>${order.customerName}</div>
              <span class="mono sub-text copyable" onclick="copyToClipboard('${cleanPhone}', 'رقم التليفون')" title="نسخ رقم التليفون" dir="ltr">${order.phone}</span>
            </td>
            <td>
              <div style="display: flex; align-items: center;">
                <span class="count-pill" title="عدد المنتجات">${formatNumber(order.totalItems)}</span>
                <span class="mono">${formatNumber(order.totalPrice)}</span>
              </div>
            </td>
            <td>
              <span class="status-badge">${order.courier}</span>
              <span class="sub-text">${order.zone !== '-' ? order.zone : 'بدون زون'}</span>
            </td>
            <td><span class="mono">${order._formattedPackDate}</span></td>
            <td>${tagsHtml || '-'}</td>
            <td>
              <div class="notes-container">${order.note || '-'}</div>
            </td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    // --- Excel Export ---
    async function exportToExcel() {
      const ordersToExport = selectedOrderIds.size > 0 
        ? allOrders.filter(o => selectedOrderIds.has(o.id)) 
        : filteredOrders;

      if (ordersToExport.length === 0) {
        showToast('لا توجد بيانات للتصدير', 'error');
        return;
      }

      showToast(`جاري تحضير ملف الإكسيل (${ordersToExport.length.toLocaleString('en-US')} أوردر)...`, 'info');
      
      const workbook = new ExcelJS.Workbook();
      workbook.views = [{ rightToLeft: true }];
      
      const sheet = workbook.addWorksheet('Ready Orders');
      sheet.views = [{ state: 'frozen', ySplit: 1, rightToLeft: true }];

      sheet.columns = [
        { header: 'رقم الأوردر',   key: 'name',        width: 15 },
        { header: 'تاريخ الإنشاء', key: 'createdAt',   width: 15 },
        { header: 'اسم العميل',    key: 'customerName', width: 25 },
        { header: 'رقم التليفون',  key: 'phone',        width: 20 },
        { header: 'عدد المنتجات',  key: 'totalItems',   width: 15 },
        { header: 'المبلغ المستحق', key: 'totalPrice',  width: 15 },
        { header: 'Courier',       key: 'courier',      width: 15 },
        { header: 'Zone',          key: 'zone',         width: 20 },
        { header: 'تاريخ التغليف', key: 'packingDate',  width: 20 },
        { header: 'Tags',          key: 'tags',         width: 30 },
        { header: 'Notes',         key: 'note',         width: 40 },
      ];

      sheet.getRow(1).font = { bold: true };
      sheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE5E7EB' } };

      ordersToExport.forEach(order => {
        const row = sheet.addRow({
          name:        order.name,
          createdAt:   order._formattedDate,
          customerName: order.customerName,
          phone:       order.phone,
          totalItems:  order.totalItems,
          totalPrice:  order.totalPrice ? parseFloat(order.totalPrice) : null,
          courier:     order.courier,
          zone:        order.zone !== '-' ? order.zone : null,
          packingDate: order._formattedPackDate,
          tags:        order.tags.join(', '),
          note:        order.note || null,
        });

        row.getCell('totalPrice').numFmt = '#,##0';
      });

      const buffer = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      
      const today = new Date();
      const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      link.download = `Ready_Orders_${dateStr}.xlsx`;
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      showToast('تم تحميل الملف بنجاح');
    }

    // --- Init ---
    window.onload = () => {
      if (isConfigured()) {
        startFetching();
      } else {
        document.getElementById('stateIcon').textContent = '⚙️';
        document.getElementById('stateText').textContent = 'يرجى إدخال إعدادات الـ Worker أولاً من زر الإعدادات بالأعلى';
      }
    };
  </script>
</body>
</html>
