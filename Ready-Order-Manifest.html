<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcomModa - الأوردرات الجاهزة للتغليف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #fff;
      --surface-2: #f9fafb;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --accent-dark: #1d4ed8;
      --green: #16a34a;
      --red: #dc2626;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --font-arabic: 'Noto Sans Arabic', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-arabic);
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      padding: 20px;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
    }

    .btn {
      background-color: var(--surface);
      border: 1px solid var(--border-strong);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-arabic);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.2s;
    }
    .btn:hover { background-color: var(--surface-2); }
    .btn-primary { background-color: var(--accent); color: white; border-color: var(--accent); }
    .btn-primary:hover { background-color: var(--accent-dark); }

    .card {
      background-color: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* Table Styles */
    .table-container {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: right;
      white-space: nowrap;
    }

    th, td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background-color: #e5e7eb;
      font-weight: 700;
      color: var(--text-primary);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    tr:hover {
      background-color: var(--surface-2);
    }

    /* Utility Classes */
    .mono { font-family: var(--font-mono); direction: ltr; display: inline-block; }
    .tag-pill {
      background-color: var(--surface-2);
      border: 1px solid var(--border-strong);
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      color: var(--text-secondary);
      margin-inline-end: 4px;
      display: inline-block;
    }
    
    .status-badge {
      background-color: var(--accent-light);
      color: var(--accent-dark);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
    }

    .notes-cell {
      max-width: 200px;
      white-space: normal;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* State Box */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .state-box .icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
    .state-box p { font-size: 14px; color: var(--text-muted); }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 400px;
      max-width: 90vw;
      padding: 24px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }

    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 24px; border-radius: var(--radius-sm);
      color: white; font-size: 14px; font-weight: 600;
      transform: translateY(100px); transition: transform 0.3s;
      z-index: 200;
    }
    #toast.show { transform: translateY(0); }
    #toast.success { background-color: var(--green); }
    #toast.error { background-color: var(--red); }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1>أوردرات Ready</h1>
    <div>
      <button class="btn" onclick="fetchOrders()">تحديث البيانات</button>
      <button class="btn" onclick="openSettings()">الإعدادات</button>
    </div>
  </div>

  <div class="card">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>رقم الأوردر</th>
            <th>تاريخ الإنشاء</th>
            <th>عدد المنتجات</th>
            <th>اسم العميل</th>
            <th>السعر</th>
            <th>رقم التليفون</th>
            <th>العنوان</th>
            <th>Courier</th>
            <th>Zone</th>
            <th>Packed By</th>
            <th>تاريخ التغليف</th>
            <th>Tags</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows will be injected here -->
        </tbody>
      </table>
    </div>
    <div id="emptyState" class="state-box">
      <div class="icon">⌛</div>
      <p>جاري تحميل البيانات...</p>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsOverlay">
    <div class="modal">
      <h2 class="modal-title">إعدادات الـ API</h2>
      <div class="input-group">
        <label>Worker URL</label>
        <input type="text" id="workerUrlInput" placeholder="https://..." dir="ltr">
      </div>
      <div class="input-group">
        <label>Worker Secret</label>
        <input type="password" id="workerSecretInput" dir="ltr">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeSettings()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveSettings()">حفظ</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const LS_URL_KEY = 'ready_orders_worker_url';
    const LS_SEC_KEY = 'ready_orders_worker_secret';

    function getConfig() {
      return {
        url: localStorage.getItem(LS_URL_KEY) || '',
        secret: localStorage.getItem(LS_SEC_KEY) || ''
      };
    }

    function isConfigured() {
      const config = getConfig();
      return config.url && config.secret;
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `show ${type}`;
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    // Modal Logic
    function openSettings() {
      const config = getConfig();
      document.getElementById('workerUrlInput').value = config.url;
      document.getElementById('workerSecretInput').value = config.secret;
      document.getElementById('settingsOverlay').classList.add('open');
    }

    function closeSettings() {
      document.getElementById('settingsOverlay').classList.remove('open');
    }

    function saveSettings() {
      const url = document.getElementById('workerUrlInput').value.trim();
      const secret = document.getElementById('workerSecretInput').value.trim();
      localStorage.setItem(LS_URL_KEY, url);
      localStorage.setItem(LS_SEC_KEY, secret);
      closeSettings();
      showToast('تم حفظ الإعدادات');
      fetchOrders();
    }

    // Formatting Logic (from EcomModa Guide)
    function formatDate(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`;
    }

    function formatDateTime(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      const pad = n => String(n).padStart(2, '0');
      let hours = d.getHours();
      const minutes = pad(d.getMinutes());
      const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
      hours = hours % 12 || 12;
      return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()} الساعة ${pad(hours)}:${minutes} ${ampm}`;
    }

    function formatNumber(num) {
      return Number(num).toLocaleString('en-US');
    }

    // API Call & Render
    async function fetchOrders() {
      if (!isConfigured()) {
        openSettings();
        return;
      }

      const tbody = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');
      
      tbody.innerHTML = '';
      emptyState.style.display = 'flex';
      emptyState.innerHTML = '<div class="icon">⏳</div><p>جاري جلب الأوردرات...</p>';

      const config = getConfig();

      try {
        const res = await fetch(config.url, {
          method: 'GET',
          headers: { 'X-Worker-Secret': config.secret }
        });

        const data = await res.json();

        if (!res.ok || !data.ok) throw new Error(data.error || 'خطأ في الاتصال بالخادم');

        renderTable(data.data);
        
      } catch (error) {
        emptyState.innerHTML = `<div class="icon">❌</div><p style="color: var(--red)">${error.message}</p>`;
        showToast(error.message, 'error');
      }
    }

    function renderTable(orders) {
      const tbody = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');

      if (!orders || orders.length === 0) {
        emptyState.style.display = 'flex';
        emptyState.innerHTML = '<div class="icon">📦</div><p>لا توجد أوردرات جاهزة (Ready) منذ 1 إبريل</p>';
        return;
      }

      emptyState.style.display = 'none';

      let html = '';
      orders.forEach(order => {
        const tagsHtml = order.tags.map(t => `<span class="tag-pill">${t}</span>`).join('');
        
        html += `
          <tr>
            <td><span class="mono">${order.name}</span></td>
            <td><span class="mono">${formatDate(order.createdAt)}</span></td>
            <td><span class="mono">${formatNumber(order.totalItems)}</span></td>
            <td>${order.customerName}</td>
            <td><span class="mono">${formatNumber(order.totalPrice)}</span></td>
            <td><span class="mono">${order.phone}</span></td>
            <td>${order.address}</td>
            <td><span class="status-badge">${order.courier}</span></td>
            <td>${order.zone}</td>
            <td>${order.packedBy}</td>
            <td><span class="mono">${formatDateTime(order.packingDate)}</span></td>
            <td>${tagsHtml || '-'}</td>
            <td class="notes-cell">${order.note || '-'}</td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    // Auto-fetch on load if configured
    window.onload = () => {
      if (isConfigured()) {
        fetchOrders();
      } else {
        document.getElementById('emptyState').innerHTML = '<div class="icon">⚙️</div><p>يرجى إدخال إعدادات الـ Worker أولاً</p>';
      }
    };
  </script>
</body>
</html>
