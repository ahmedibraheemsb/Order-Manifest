<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcomModa - الأوردرات الجاهزة للتغليف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #fff;
      --surface-2: #f9fafb;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --accent-dark: #1d4ed8;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --green-border: #86efac;
      --red: #dc2626;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --font-arabic: 'Noto Sans Arabic', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-arabic);
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      padding: 20px;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
    }

    .btn {
      background-color: var(--surface);
      border: 1px solid var(--border-strong);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-arabic);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.2s;
    }
    .btn:hover { background-color: var(--surface-2); }
    .btn-primary { background-color: var(--accent); color: white; border-color: var(--accent); }
    .btn-primary:hover { background-color: var(--accent-dark); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .card {
      background-color: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      max-height: 75vh;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: right;
      white-space: nowrap;
    }

    th, td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      background-color: #e5e7eb;
      font-weight: 700;
      color: var(--text-primary);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    tr:hover { background-color: var(--surface-2); }

    .mono { font-family: var(--font-mono); direction: ltr; display: inline-block; }
    
    .tag-pill {
      background-color: var(--surface-2);
      border: 1px solid var(--border-strong);
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      color: var(--text-secondary);
      margin-inline-end: 4px;
      margin-bottom: 4px;
      display: inline-block;
    }

    /* كلاس التمييز لتاج التغليف */
    .tag-packed {
      background-color: var(--green-light);
      border-color: var(--green-border);
      color: var(--green);
      font-weight: 600;
    }
    
    .status-badge {
      background-color: var(--accent-light);
      color: var(--accent-dark);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
    }

    /* التحكم في عرض آخر عمودين */
    .col-half {
      width: 25%;
      min-width: 200px;
    }
    
    .cell-wrap {
      white-space: normal;
      word-break: break-word;
      line-height: 1.8;
    }

    .notes-cell {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* State Box */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      text-align: center;
    }
    .state-box .icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
    .state-box p { font-size: 14px; color: var(--text-muted); font-weight: 500; }
    .state-box .progress { font-size: 12px; color: var(--accent); margin-top: 8px; font-weight: 600; }

    /* Modals & Toasts */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface); border-radius: var(--radius); width: 400px; max-width: 90vw;
      padding: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .input-group input {
      width: 100%; padding: 10px; border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 13px;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

    #toast {
      position: fixed; bottom: 24px; right: 24px; padding: 12px 24px; border-radius: var(--radius-sm);
      color: white; font-size: 14px; font-weight: 600; transform: translateY(100px); transition: transform 0.3s; z-index: 200;
    }
    #toast.show { transform: translateY(0); }
    #toast.success { background-color: var(--green); }
    #toast.error { background-color: var(--red); }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1>أوردرات Ready (<span id="totalCount">0</span>)</h1>
    <div>
      <button class="btn" id="refreshBtn" onclick="startFetching()">تحديث البيانات</button>
      <button class="btn" onclick="openSettings()">الإعدادات</button>
    </div>
  </div>

  <div class="card">
    <div id="emptyState" class="state-box">
      <div class="icon" id="stateIcon">⌛</div>
      <p id="stateText">جاري تهيئة الأداة...</p>
      <div class="progress" id="stateProgress"></div>
    </div>
    
    <div class="table-container" id="tableContainer">
      <table>
        <thead>
          <tr>
            <th>رقم الأوردر</th>
            <th>تاريخ الإنشاء</th>
            <th>عدد المنتجات</th>
            <th>اسم العميل</th>
            <th>السعر</th>
            <th>رقم التليفون</th>
            <th>Courier</th>
            <th>Zone</th>
            <th>تاريخ التغليف</th>
            <th class="col-half">Tags</th>
            <th class="col-half">Notes</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsOverlay">
    <div class="modal">
      <h2 class="modal-title">إعدادات الـ API</h2>
      <div class="input-group">
        <label>Worker URL</label>
        <input type="text" id="workerUrlInput" placeholder="https://..." dir="ltr">
      </div>
      <div class="input-group">
        <label>Worker Secret</label>
        <input type="password" id="workerSecretInput" dir="ltr">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeSettings()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveSettings()">حفظ</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const LS_URL_KEY = 'ready_orders_worker_url';
    const LS_SEC_KEY = 'ready_orders_worker_secret';
    let isFetching = false;
    let currentTotalReady = 0;

    function getConfig() {
      return { url: localStorage.getItem(LS_URL_KEY) || '', secret: localStorage.getItem(LS_SEC_KEY) || '' };
    }

    function isConfigured() {
      const config = getConfig();
      return config.url && config.secret;
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `show ${type}`;
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    function openSettings() {
      const config = getConfig();
      document.getElementById('workerUrlInput').value = config.url;
      document.getElementById('workerSecretInput').value = config.secret;
      document.getElementById('settingsOverlay').classList.add('open');
    }

    function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }

    function saveSettings() {
      localStorage.setItem(LS_URL_KEY, document.getElementById('workerUrlInput').value.trim());
      localStorage.setItem(LS_SEC_KEY, document.getElementById('workerSecretInput').value.trim());
      closeSettings();
      showToast('تم حفظ الإعدادات');
      startFetching();
    }

    function formatDate(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`;
    }

    // الدالة الجديدة لعرض التاريخ المدمج مع صباحاً/مساءً بدون الوقت
    function formatPackingDateOnly(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      const pad = n => String(n).padStart(2, '0');
      const hours = d.getHours();
      const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
      return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}${ampm}`;
    }

    function formatNumber(num) { return Number(num).toLocaleString('en-US'); }

    async function startFetching() {
      if (!isConfigured()) { openSettings(); return; }
      if (isFetching) return;

      isFetching = true;
      document.getElementById('refreshBtn').disabled = true;
      
      const tbody = document.getElementById('tableBody');
      const tableContainer = document.getElementById('tableContainer');
      const emptyState = document.getElementById('emptyState');
      const progressText = document.getElementById('stateProgress');
      
      // Reset UI
      tbody.innerHTML = '';
      tableContainer.style.display = 'none';
      emptyState.style.display = 'flex';
      document.getElementById('stateIcon').textContent = '🔄';
      document.getElementById('stateText').textContent = 'جاري الاتصال بـ Shopify...';
      progressText.textContent = '';
      currentTotalReady = 0;
      document.getElementById('totalCount').textContent = '0';

      const config = getConfig();
      let hasNextPage = true;
      let cursor = null;
      let pagesScanned = 0;

      try {
        while (hasNextPage) {
          const fetchUrl = new URL(config.url);
          if (cursor) fetchUrl.searchParams.set('cursor', cursor);

          const res = await fetch(fetchUrl.toString(), {
            method: 'GET',
            headers: { 'X-Worker-Secret': config.secret }
          });

          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error(data.error || 'خطأ في الاتصال');

          if (data.data && data.data.length > 0) {
            appendRows(data.data);
            currentTotalReady += data.data.length;
            document.getElementById('totalCount').textContent = currentTotalReady;
            
            if (tableContainer.style.display === 'none') {
              emptyState.style.display = 'none';
              tableContainer.style.display = 'block';
            }
          }

          pagesScanned++;
          
          if (tableContainer.style.display === 'none') {
            progressText.textContent = `تم فحص ${pagesScanned * 50} أوردر...`;
          }

          hasNextPage = data.pageInfo.hasNextPage;
          cursor = data.pageInfo.endCursor;
        }

        isFetching = false;
        document.getElementById('refreshBtn').disabled = false;
        
        if (currentTotalReady === 0) {
          emptyState.style.display = 'flex';
          tableContainer.style.display = 'none';
          document.getElementById('stateIcon').textContent = '📦';
          document.getElementById('stateText').textContent = 'لا توجد أوردرات جاهزة (Ready) منذ 1 إبريل';
          progressText.textContent = '';
        } else {
          showToast('تم الانتهاء من جلب جميع الأوردرات');
        }

      } catch (error) {
        isFetching = false;
        document.getElementById('refreshBtn').disabled = false;
        emptyState.style.display = 'flex';
        tableContainer.style.display = 'none';
        document.getElementById('stateIcon').textContent = '❌';
        document.getElementById('stateText').textContent = error.message;
        document.getElementById('stateText').style.color = 'var(--red)';
        progressText.textContent = '';
        showToast(error.message, 'error');
      }
    }

    function appendRows(orders) {
      const tbody = document.getElementById('tableBody');
      let html = '';
      
      orders.forEach(order => {
        // تمييز الـ Tag لو كان Packed
        const tagsHtml = order.tags.map(t => {
          const isPacked = t.toLowerCase() === 'packed';
          const extraClass = isPacked ? 'tag-packed' : '';
          return `<span class="tag-pill ${extraClass}">${t}</span>`;
        }).join('');

        html += `
          <tr>
            <td><span class="mono">${order.name}</span></td>
            <td><span class="mono">${formatDate(order.createdAt)}</span></td>
            <td><span class="mono">${formatNumber(order.totalItems)}</span></td>
            <td>${order.customerName}</td>
            <td><span class="mono">${formatNumber(order.totalPrice)}</span></td>
            <td><span class="mono">${order.phone}</span></td>
            <td><span class="status-badge">${order.courier}</span></td>
            <td>${order.zone}</td>
            <td><span class="mono">${formatPackingDateOnly(order.packingDate)}</span></td>
            <td class="cell-wrap">${tagsHtml || '-'}</td>
            <td class="notes-cell cell-wrap">${order.note || '-'}</td>
          </tr>
        `;
      });

      tbody.insertAdjacentHTML('beforeend', html);
    }

    window.onload = () => {
      if (isConfigured()) {
        startFetching();
      } else {
        document.getElementById('stateIcon').textContent = '⚙️';
        document.getElementById('stateText').textContent = 'يرجى إدخال إعدادات الـ Worker أولاً';
      }
    };
  </script>
</body>
</html>
